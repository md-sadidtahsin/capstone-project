apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: node-service-hpa
  namespace: urlshortener
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: node-service
  minReplicas: 1
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80